function normalizeText(text) {
  return text.toLowerCase()
    .replace(/[@4]/g, "a")
    .replace(/[3]/g, "e")
    .replace(/[1!|]/g, "i")
    .replace(/[0]/g, "o")
    .replace(/[5\$]/g, "s")
    .replace(/[7]/g, "t")
    .replace(/[+]/g, "t")
    .replace(/ph/g, "f")
    .replace(/[^a-z]/g, "");
}

function containsProfanity(text) {
  if (!text || text.trim().length === 0) return false;
  // Check normalized version (catches l33t speak)
  const normalized = normalizeText(text);
  for (const word of BLOCKED_WORDS) {
    if (normalized.includes(word)) return true;
  }
  // Check with only non-alpha stripped (catches "f u c k" and "f.u.c.k")
  const stripped = text.toLowerCase().replace(/[^a-z]/g, "");
  for (const word of BLOCKED_WORDS) {
    if (stripped.includes(word)) return true;
  }
  // Check each space-separated word individually
  const words = text.toLowerCase().split(/\s+/);
  for (const w of words) {
    const cleanW = w.replace(/[^a-z]/g, "");
    for (const blocked of BLOCKED_WORDS) {
      if (cleanW === blocked) return true;
    }
  }
  return false;
}

function validateEntry(name, company) {
  if (name.trim().length === 0) return "ENTER YOUR NAME";
  if (name.trim().length < 2) return "NAME TOO SHORT";
  if (containsProfanity(name)) return "KEEP IT CLEAN, CHAMP!";
  if (company && containsProfanity(company)) return "KEEP IT CLEAN, CHAMP!";
  // Block obvious junk
  if (/^(.)\1{4,}$/.test(name.trim())) return "NICE TRY \u2014 ENTER A REAL NAME";
  return null;
}

async function fetchLeaderboard() {
  try {
    const res = await fetch(FIREBASE_URL + "/leaderboard.json");

    if (data) {
      leaderboard = Object.values(data).sort((a, b) => b.score - a.score).slice(0, 10);
    } else {
      leaderboard = [];
    }
    leaderboardLoaded = true;
  } catch (e) { console.warn("Leaderboard fetch failed:", e); leaderboardLoaded = true; }
}

async function submitScore(name, company, score) {
  if (containsProfanity(name) || containsProfanity(company)) {
    entryError = "KEEP IT CLEAN, CHAMP!";
    nameSubmitted = false;
    return;

  try {
    await fetch(FIREBASE_URL + "/leaderboard.json", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ name, company, score, date: new Date().toISOString() })

    await fetchLeaderboard();
  } catch (e) { console.warn("Score submit failed:", e); }
}

// ═══════ AI ═══════
function updateAI(v,p){
  if(v.state!=="idle"&&v.state!=="walk"&&v.state!=="block"&&v.state!=="crouch")return;
  const dist=Math.abs(v.x-p.x);
  v.aiTimer--;
  if(v.aiTimer>0)return;
  // Reaction to player attacks
  if(p.state==="attack"&&p.attackFrame<5&&Math.random()<v.aiAggro*1.5){
    v.blocking=true;v.aiTimer=20+Math.random()*15;return}
  if(dist<70){
    // In range — attack or block
    const r=Math.random();
    if(r<v.aiAggro*0.5){v.state="attack";v.attackType="jab";v.attackFrame=0;v.hitThisAttack=false;v.aiTimer=20}
    else if(r<v.aiAggro*0.75){v.state="attack";v.attackType="hook";v.attackFrame=0;v.hitThisAttack=false;v.aiTimer=28}
    else if(r<v.aiAggro*0.88){v.state="attack";v.attackType="uppercut";v.attackFrame=0;v.hitThisAttack=false;v.aiTimer=35}
    else if(r<v.aiAggro*0.95&&v.special>=v.maxSpecial){v.state="attack";v.attackType="special_p2";v.attackFrame=0;v.hitThisAttack=false;v.special=0;v.specialCooldown=180;v.aiTimer=45}
    else{v.blocking=true;v.aiTimer=15+Math.random()*20}
  }else if(dist<200){
    // Approach
    v.blocking=false;
    v.vx=v.facing*WALK_SPD*(0.6+v.aiAggro*0.5);
    v.aiTimer=8+Math.random()*12;
  }else{
    // Far — walk in
    v.blocking=false;
    v.vx=v.facing*WALK_SPD;
    v.aiTimer=5+Math.random()*8;
  }
}

    const atk=isSp?(aN==="special_p1"?{dmg:28,range:58,startup:16,active:8,recovery:30,hitstun:44,blockstun:20,push:10}:{dmg:20,range:56,startup:14,active:7,recovery:28,hitstun:34,blockstun:18,push:7}):ATTACKS[aN];

        if(oppBlk){opp.state="blockstun";opp.stunFrames=atk.blockstun;opp.hp-=Math.max(1,Math.floor(atk.dmg*0.12));opp.vx=p.facing*atk.push*0.4;opp.hitDir=p.facing;p.special=Math.min(p.maxSpecial,p.special+10);hitSpark={x:(p.x+opp.x)/2,y:opp.y-40,frame:0,big:false};screenShake=3}

  if(screen==="enterName"){Object.keys(justPressed).forEach(k=>justPressed[k]=false);return}
  if(screen==="matchEnd"&&matchEndTimer===0)fetchLeaderboard();
  updateAI(villain,player);
  updateFighter(player,villain,PK,false);

  player.vx*=0.9;villain.vx*=0.9;
  if(hitSpark){hitSpark.frame++;if(hitSpark.frame>12)hitSpark=null}
  if(screenShake>0)screenShake--;
  // Particles
  particles=particles.filter(p2=>{p2.x+=p2.vx;p2.y+=p2.vy;p2.vy-=0.03;p2.life--;return p2.life>0});
  timerAccum++;if(timerAccum>=60){timerAccum=0;roundTimer=Math.max(0,roundTimer-1)}
  if((player.hp<=0&&player.state==="knockdown"&&player.onGround)||(villain.hp<=0&&villain.state==="knockdown"&&villain.onGround)||roundTimer<=0){
    if(player.hp>villain.hp){pWins++;gameScore+=500+player.hp*10+Math.max(0,roundTimer)*5}else if(villain.hp>player.hp)vWins++;else{pWins+=0.5;vWins+=0.5}

  ctx.save();
  if(screenShake>0)ctx.translate(Math.sin(frame*1.5)*screenShake,Math.cos(frame*1.8)*screenShake*0.5);
  if(screen==="title"){drawTitle();ctx.restore();return}
  if(screen==="intro"){drawIntro();ctx.restore();return}
  if(screen==="enterName"){drawEnterName();ctx.restore();return}
  if(screen==="matchEnd"){drawMatchEnd();ctx.restore();return}
  drawRing();drawParticles();
  if(player.y<=villain.y){drawDrew(player);drawCAC(villain)}else{drawCAC(villain);drawDrew(player)}
  drawHitSpark();drawHUD();drawScoreHUD();drawAnnounce();
  if(screen==="roundEnd"){
    ctx.fillStyle="rgba(6,6,12,0.6)";ctx.fillRect(0,150,W,80);
    const cx2=W/2,w=player.hp>villain.hp,wc=w?C.green:C.voidAccent;
    ctx.fillStyle=wc;ctx.font="bold 28px 'Courier New'";ctx.textAlign="center";ctx.fillText(w?"THE POSTMAN WINS!":"THE C.A.C. WINS!",cx2,185);
    ctx.fillStyle=C.steel;ctx.font="bold 12px 'Courier New'";ctx.fillText("ROUND "+roundNum,cx2,210)}
  ctx.restore();
}

function gameLoop(){update();draw();requestAnimationFrame(gameLoop)}
gameLoop();
</script>
